<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Timestamp Microservice | freeCodeCamp</title>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        background-color: #f8fafc;
        color: #334155;
        margin-top: 50px;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }
      h1 { margin-bottom: 20px; color: #0f172a; }
      ul { 
        text-align: left; 
        background: #f1f5f9; 
        padding: 20px; 
        border-radius: 8px; 
        list-style: none;
      }
      li { margin: 10px 0; }
      a { color: #2563eb; text-decoration: none; font-weight: bold;}
      a:hover { text-decoration: underline; }
      code { 
        background: #1e293b; 
        color: #f8fafc; 
        padding: 5px 10px; 
        border-radius: 5px; 
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Timestamp Microservice</h1>
      <hr />
      <h3>Example Usage:</h3>
      <ul>
        <li><a href="api/2015-12-25">/api/2015-12-25</a></li>
        <li><a href="api/1451001600000">/api/1451001600000</a></li>
      </ul>
      <h3>Example Output:</h3>
      <p>
        <code>{"unix":1451001600000, "utc":"Fri, 25 Dec 2015 00:00:00 GMT"}</code>
      </p>
    </div>
  </body>
</html>
