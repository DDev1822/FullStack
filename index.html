<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>URL Shortener | freeCodeCamp</title>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        background-color: #f8fafc;
        color: #334155;
        margin-top: 50px;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }
      h1 { margin-bottom: 20px; color: #0f172a; }
      form { margin-top: 20px; }
      input[type="text"] {
        padding: 10px;
        width: 60%;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        margin-right: 10px;
      }
      input[type="submit"] {
        padding: 10px 20px;
        background-color: #2563eb;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      input[type="submit"]:hover { background-color: #1d4ed8; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>URL Shortener Microservice</h1>
      <hr />
      <h3>Acorta tu URL aquí:</h3>
      <!-- El formulario hace POST directamente a nuestra API -->
      <form action="/api/shorturl" method="POST">
        <input type="text" name="url" placeholder="https://www.freecodecamp.org" required>
        <input type="submit" value="POST URL">
      </form>
    </div>
  </body>
</html>
